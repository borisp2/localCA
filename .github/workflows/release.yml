name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [ win-x64, linux-x64, osx-x64, osx-arm64 ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test LocalCA.sln --configuration Release --verbosity normal

      - name: Publish self-contained
        run: >
          dotnet publish src/LocalCA.Cli/LocalCA.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish/${{ matrix.rid }}

      - name: Create archive (Linux/macOS)
        if: matrix.rid != 'win-x64'
        run: |
          cd publish/${{ matrix.rid }}
          tar -czf ../../localca-${{ matrix.rid }}.tar.gz *

      - name: Create archive (Windows)
        if: matrix.rid == 'win-x64'
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../localca-${{ matrix.rid }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: localca-${{ matrix.rid }}
          path: localca-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
